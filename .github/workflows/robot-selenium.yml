name: Robot Framework (Selenium + Chrome)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Install Google Chrome (stable)
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else
            pip install robotframework robotframework-seleniumlibrary selenium
          fi

      # Run Robot tests with headless Chrome
      - name: Run tests
        env:
          ROBOT_ARGS: ""
        run: |
          mkdir -p reports
          robot --outputdir reports $ROBOT_ARGS tests

      - name: Upload Robot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports
          path: reports/**
          retention-days: 14
